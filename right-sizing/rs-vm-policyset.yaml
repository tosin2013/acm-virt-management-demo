apiVersion: policy.open-cluster-management.io/v1beta1
kind: PolicySet
metadata:
  name: rs-vm-policyset
  namespace: open-cluster-management-policies
spec:
  description: Right-sizing recording rules and metrics allowlist for OpenShift Virtualization VMs
  policies:
    - rs-vm-recording-rules
    - rs-vm-metrics-allowlist
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: rs-vm-policyset-placement
  namespace: open-cluster-management-policies
placementRef:
  name: virt-enabled-clusters
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: rs-vm-policyset
    apiGroup: policy.open-cluster-management.io
    kind: PolicySet
