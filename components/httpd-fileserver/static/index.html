<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTTP File Server</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;padding:2rem}
.container{max-width:1000px;margin:0 auto}
h1{color:#00d4ff;margin-bottom:.5rem;font-size:1.8rem}
.subtitle{color:#888;margin-bottom:2rem;font-size:.9rem}
.drop-zone{border:2px dashed #444;border-radius:12px;padding:3rem;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:2rem;background:#16213e}
.drop-zone:hover,.drop-zone.dragover{border-color:#00d4ff;background:#1a2540}
.drop-zone p{color:#aaa;margin-bottom:1rem}
.btn{background:#00d4ff;color:#1a1a2e;border:none;padding:.6rem 1.5rem;border-radius:6px;cursor:pointer;font-weight:600;font-size:.9rem;transition:background .2s}
.btn:hover{background:#00b8d4}
.btn-danger{background:#ff4757;color:#fff}
.btn-danger:hover{background:#ff3344}
.btn-sm{padding:.3rem .8rem;font-size:.8rem}
.progress-container{display:none;margin:1rem 0}
.progress-bar{height:8px;background:#333;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#00d4ff,#00ff88);width:0;transition:width .3s}
.progress-text{font-size:.8rem;color:#aaa;margin-top:.5rem}
table{width:100%;border-collapse:collapse;margin-top:1rem}
th{text-align:left;padding:.8rem;border-bottom:2px solid #333;color:#00d4ff;font-size:.85rem;text-transform:uppercase}
td{padding:.7rem .8rem;border-bottom:1px solid #2a2a3e;font-size:.9rem}
tr:hover td{background:#16213e}
.url-cell{display:flex;align-items:center;gap:.5rem}
.url-cell code{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.copy-btn{background:none;border:1px solid #555;color:#aaa;padding:.2rem .5rem;border-radius:4px;cursor:pointer;font-size:.75rem;white-space:nowrap;flex-shrink:0}
.copy-btn:hover{border-color:#00d4ff;color:#00d4ff}
.size{color:#888}
.toast{position:fixed;bottom:2rem;right:2rem;padding:1rem 1.5rem;border-radius:8px;color:#fff;font-size:.9rem;opacity:0;transition:opacity .3s;z-index:999}
.toast.show{opacity:1}
.toast.success{background:#00c853}
.toast.error{background:#ff4757}
.empty{text-align:center;padding:3rem;color:#666}
input[type=file]{display:none}
</style>
</head>
<body>
<div class="container">
<h1>HTTP File Server</h1>
<p class="subtitle">Upload files for CDI DataVolumes, Tekton pipelines, and workloads</p>

<div class="drop-zone" id="dropZone">
<p>Drag &amp; drop files here or click to browse</p>
<button class="btn" onclick="document.getElementById('fileInput').click()">Select Files</button>
<input type="file" id="fileInput" multiple>
</div>

<div class="progress-container" id="progressContainer">
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<p class="progress-text" id="progressText">Uploading...</p>
</div>

<h2 style="color:#ccc;font-size:1.1rem;margin-bottom:.5rem">Files</h2>
<div id="fileList"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const dropZone=document.getElementById('dropZone');
const fileInput=document.getElementById('fileInput');
const progressContainer=document.getElementById('progressContainer');
const progressFill=document.getElementById('progressFill');
const progressText=document.getElementById('progressText');

dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('dragover')});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('dragover');uploadFiles(e.dataTransfer.files)});
fileInput.addEventListener('change',()=>uploadFiles(fileInput.files));

function uploadFiles(files){
  if(!files.length)return;
  const formData=new FormData();
  for(let f of files)formData.append('file',f);

  const xhr=new XMLHttpRequest();
  progressContainer.style.display='block';
  const startTime=Date.now();

  xhr.upload.onprogress=e=>{
    if(e.lengthComputable){
      const pct=Math.round(e.loaded/e.total*100);
      progressFill.style.width=pct+'%';
      const elapsed=(Date.now()-startTime)/1000;
      const speed=e.loaded/elapsed;
      const remaining=((e.total-e.loaded)/speed);
      progressText.textContent=`${pct}% — ${formatSize(speed)}/s — ${Math.round(remaining)}s remaining`;
    }
  };
  xhr.onload=()=>{
    progressContainer.style.display='none';
    progressFill.style.width='0';
    if(xhr.status===201){showToast('Upload complete','success');loadFiles()}
    else showToast('Upload failed: '+xhr.responseText,'error');
  };
  xhr.onerror=()=>{progressContainer.style.display='none';showToast('Upload failed','error')};
  xhr.open('POST','/api/upload');
  xhr.send(formData);
}

function loadFiles(){
  fetch('/api/files').then(r=>r.json()).then(files=>{
    const container=document.getElementById('fileList');
    if(!files||!files.length){container.innerHTML='<p class="empty">No files uploaded yet</p>';return}
    let html='<table><thead><tr><th>Name</th><th>Size</th><th>Modified</th><th>CDI URL</th><th></th></tr></thead><tbody>';
    for(const f of files){
      const modified=new Date(f.modified).toLocaleString();
      html+=`<tr>
        <td>${esc(f.name)}</td>
        <td class="size">${formatSize(f.size)}</td>
        <td class="size">${modified}</td>
        <td class="url-cell"><code>${esc(f.url)}</code><button class="copy-btn" onclick="copyUrl('${esc(f.url)}')">copy</button></td>
        <td><button class="btn btn-danger btn-sm" onclick="deleteFile('${esc(f.name)}')">Delete</button></td>
      </tr>`;
    }
    html+='</tbody></table>';
    container.innerHTML=html;
  });
}

function deleteFile(name){
  if(!confirm(`Delete "${name}"?`))return;
  fetch('/api/delete/'+encodeURIComponent(name),{method:'DELETE'})
    .then(r=>{if(r.ok){showToast('Deleted '+name,'success');loadFiles()}else showToast('Delete failed','error')});
}

function copyUrl(url){
  navigator.clipboard.writeText(url).then(()=>showToast('URL copied','success'));
}

function formatSize(bytes){
  if(bytes<1024)return bytes+' B';
  if(bytes<1048576)return(bytes/1024).toFixed(1)+' KB';
  if(bytes<1073741824)return(bytes/1048576).toFixed(1)+' MB';
  return(bytes/1073741824).toFixed(2)+' GB';
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+type+' show';
  setTimeout(()=>t.classList.remove('show'),3000);
}

loadFiles();
</script>
</body>
</html>
