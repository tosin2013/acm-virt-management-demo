apiVersion: v1
kind: ConfigMap
metadata:
  name: vm-fleet-grafana-dashboard
  namespace: open-cluster-management-observability
  labels:
    grafana-custom-dashboard: "true"
data:
  vm-fleet-metrics.json: |
    {
      "uid": "acm-vm-fleet-metrics",
      "title": "ACM VM Fleet Metrics",
      "timezone": "browser",
      "schemaVersion": 36,
      "version": 1,
      "refresh": "5m",
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "panels": [
        {
          "id": 1,
          "title": "VM Count by Status",
          "type": "stat",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "datasource": "Observatorium",
          "targets": [
            {
              "expr": "count by (status) (kubevirt_vm_running_status_last_transition_timestamp_seconds)",
              "legendFormat": "{{ status }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "none"
          }
        },
        {
          "id": 2,
          "title": "VM CPU Usage Ratio by Cluster",
          "type": "timeseries",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "datasource": "Observatorium",
          "targets": [
            {
              "expr": "avg by (cluster) (kubevirt:vm_cpu_usage_ratio)",
              "legendFormat": "{{ cluster }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "spanNulls": false,
                "showPoints": "auto",
                "axisPlacement": "auto"
              },
              "unit": "percentunit"
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "single"
            }
          }
        },
        {
          "id": 3,
          "title": "VM Memory Usage Ratio by Cluster",
          "type": "timeseries",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 8
          },
          "datasource": "Observatorium",
          "targets": [
            {
              "expr": "avg by (cluster) (kubevirt:vm_memory_usage_ratio)",
              "legendFormat": "{{ cluster }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "spanNulls": false,
                "showPoints": "auto",
                "axisPlacement": "auto"
              },
              "unit": "percentunit"
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "single"
            }
          }
        },
        {
          "id": 4,
          "title": "Top 10 Over-Provisioned VMs (CPU)",
          "type": "table",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 8
          },
          "datasource": "Observatorium",
          "targets": [
            {
              "expr": "topk(10, kubevirt:vm_cpu_usage_ratio < 0.5)",
              "format": "table",
              "instant": true,
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.3 },
                  { "color": "red", "value": 0.1 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "showHeader": true,
            "sortBy": [
              {
                "displayName": "Value",
                "desc": false
              }
            ]
          },
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true
                },
                "renameByName": {
                  "cluster": "Cluster",
                  "name": "VM Name",
                  "namespace": "Namespace",
                  "Value": "CPU Usage Ratio"
                }
              }
            }
          ]
        }
      ]
    }
