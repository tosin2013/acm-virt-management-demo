apiVersion: v1
kind: ConfigMap
metadata:
  name: thanos-ruler-custom-rules
  namespace: open-cluster-management-observability
data:
  custom_rules.yaml: |
    groups:
      - name: vm-fleet-alerts
        rules:
        - alert: VMOverProvisionedCPU
          annotations:
            summary: "VM {{ $labels.name }} in {{ $labels.namespace }} on cluster {{ $labels.cluster }} is using less than 10% of requested CPU"
            description: "The VM has been using less than 10% of its requested CPU for 1 hour. Consider reducing CPU requests to optimize resource allocation."
          expr: |
            kubevirt:vm_cpu_usage_ratio < 0.1
          for: 1h
          labels:
            severity: info
        - alert: VMUnderProvisionedMemory
          annotations:
            summary: "VM {{ $labels.name }} in {{ $labels.namespace }} on cluster {{ $labels.cluster }} is using more than 90% of requested memory"
            description: "The VM has been using more than 90% of its requested memory for 30 minutes. Consider increasing memory requests to prevent OOM conditions."
          expr: |
            kubevirt:vm_memory_usage_ratio > 0.9
          for: 30m
          labels:
            severity: warning
