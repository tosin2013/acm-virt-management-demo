apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: vm-security-hardening
  namespace: open-cluster-management-policies
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: "SC System and Communications Protection, CM Configuration Management"
    policy.open-cluster-management.io/controls: "SC-28 Protection of Information at Rest, CM-6 Configuration Settings"
spec:
  remediationAction: enforce
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: vm-hardened-server-preference
        spec:
          remediationAction: enforce
          severity: medium
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: instancetype.kubevirt.io/v1beta1
                kind: VirtualMachineClusterPreference
                metadata:
                  name: hardened-server-vm
                spec:
                  devices:
                    preferredAutoattachSerialConsole: false
                    preferredAutoattachGraphicsDevice: false
