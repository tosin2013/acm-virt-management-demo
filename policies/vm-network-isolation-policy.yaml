apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: vm-network-isolation
  namespace: open-cluster-management-policies
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: SC System and Communications Protection
    policy.open-cluster-management.io/controls: SC-7 Boundary Protection
spec:
  remediationAction: enforce
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: vm-default-deny-ingress
        spec:
          remediationAction: enforce
          severity: high
          namespaceSelector:
            include:
              - vm-production
              - vm-staging
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: networking.k8s.io/v1
                kind: NetworkPolicy
                metadata:
                  name: default-deny-ingress
                spec:
                  podSelector: {}
                  policyTypes:
                    - Ingress
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: vm-allow-ingress-rules
        spec:
          remediationAction: enforce
          severity: high
          namespaceSelector:
            include:
              - vm-production
              - vm-staging
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: networking.k8s.io/v1
                kind: NetworkPolicy
                metadata:
                  name: allow-same-namespace
                spec:
                  podSelector: {}
                  policyTypes:
                    - Ingress
                  ingress:
                    - from:
                        - podSelector: {}
            - complianceType: musthave
              objectDefinition:
                apiVersion: networking.k8s.io/v1
                kind: NetworkPolicy
                metadata:
                  name: allow-monitoring-scrape
                spec:
                  podSelector: {}
                  policyTypes:
                    - Ingress
                  ingress:
                    - from:
                        - namespaceSelector:
                            matchLabels:
                              kubernetes.io/metadata.name: openshift-monitoring
            - complianceType: musthave
              objectDefinition:
                apiVersion: networking.k8s.io/v1
                kind: NetworkPolicy
                metadata:
                  name: allow-kubevirt-vmi-traffic
                spec:
                  podSelector:
                    matchLabels:
                      kubevirt.io: virt-launcher
                  policyTypes:
                    - Ingress
                  ingress:
                    - from:
                        - podSelector:
                            matchLabels:
                              kubevirt.io: virt-launcher
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: vm-allow-egress-rules
        spec:
          remediationAction: enforce
          severity: high
          namespaceSelector:
            include:
              - vm-production
              - vm-staging
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: networking.k8s.io/v1
                kind: NetworkPolicy
                metadata:
                  name: default-deny-egress
                spec:
                  podSelector: {}
                  policyTypes:
                    - Egress
            - complianceType: musthave
              objectDefinition:
                apiVersion: networking.k8s.io/v1
                kind: NetworkPolicy
                metadata:
                  name: allow-dns-egress
                spec:
                  podSelector: {}
                  policyTypes:
                    - Egress
                  egress:
                    - to:
                        - namespaceSelector:
                            matchLabels:
                              kubernetes.io/metadata.name: openshift-dns
                      ports:
                        - protocol: TCP
                          port: 53
                        - protocol: UDP
                          port: 53
            - complianceType: musthave
              objectDefinition:
                apiVersion: networking.k8s.io/v1
                kind: NetworkPolicy
                metadata:
                  name: allow-http-egress
                spec:
                  podSelector: {}
                  policyTypes:
                    - Egress
                  egress:
                    - ports:
                        - protocol: TCP
                          port: 80
                        - protocol: TCP
                          port: 443
