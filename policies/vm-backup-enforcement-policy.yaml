apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: vm-backup-enforcement
  namespace: open-cluster-management-policies
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: CP Contingency Planning
    policy.open-cluster-management.io/controls: CP-9 System Backup
spec:
  remediationAction: enforce
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: oadp-operator-installed
        spec:
          remediationAction: enforce
          severity: high
          namespaceSelector:
            include:
              - openshift-adp
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: operators.coreos.com/v1alpha1
                kind: Subscription
                metadata:
                  name: redhat-oadp-operator
                  namespace: openshift-adp
                spec:
                  channel: stable-1.4
                  installPlanApproval: Automatic
                  name: redhat-oadp-operator
                  source: redhat-operators
                  sourceNamespace: openshift-marketplace
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: vm-backup-schedule
        spec:
          remediationAction: enforce
          severity: high
          namespaceSelector:
            include:
              - openshift-adp
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: velero.io/v1
                kind: Schedule
                metadata:
                  name: vm-critical-backup
                  namespace: openshift-adp
                spec:
                  schedule: "0 2 * * *"
                  template:
                    includedNamespaces:
                      - vm-production
                      - vm-staging
                    includedResources:
                      - virtualmachines.kubevirt.io
                      - virtualmachineinstances.kubevirt.io
                      - datavolumes.cdi.kubevirt.io
                      - persistentvolumeclaims
                    storageLocation: default
                    ttl: 168h0m0s
                    snapshotVolumes: true
                    defaultVolumesToFsBackup: false
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: vm-backup-dpa-config
        spec:
          remediationAction: inform
          severity: medium
          namespaceSelector:
            include:
              - openshift-adp
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: oadp.openshift.io/v1alpha1
                kind: DataProtectionApplication
                metadata:
                  name: vm-dpa
                  namespace: openshift-adp
                spec:
                  configuration:
                    velero:
                      defaultPlugins:
                        - openshift
                        - aws
                        - csi
                        - kubevirt
                    nodeAgent:
                      enable: true
                      uploaderType: kopia
                  backupLocations:
                    - velero:
                        provider: aws
                        default: true
                        objectStorage:
                          bucket: acm-vm-backups
                          prefix: velero
                        credential:
                          name: cloud-credentials
                          key: cloud
                        config:
                          region: us-east-2
