apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: vm-eviction-strategy
  namespace: open-cluster-management-policies
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: CP Contingency Planning
    policy.open-cluster-management.io/controls: CP-2 Contingency Plan
spec:
  remediationAction: inform
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: vm-eviction-cluster-preference
        spec:
          remediationAction: inform
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: instancetype.kubevirt.io/v1beta1
                kind: VirtualMachineClusterPreference
                metadata:
                  name: production-vm-preference
                spec:
                  preferredEvictionStrategy: LiveMigrate
